<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Routing Composer Prototype v4</title>
<style>
:root{--bg:#070a11;--panel:#111724ee;--panel2:#151b2acc;--line:#2b3549;--text:#eaf0ff;--muted:#9aa7bd;--cyan:#5adfff;--purple:#a979ff;--green:#72e18a;--yellow:#ffd45e;--pink:#ff67dc;--danger:#ff6675}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 10%,#1b2442 0,#070a11 42%,#04060a 100%);font-family:Inter,Segoe UI,Arial,sans-serif;color:var(--text);overflow:hidden}.launcher{position:fixed;left:24px;top:24px;display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:999px;border:1px solid #3b455c;background:#111827d9;color:#eaf0ff;font-weight:800;box-shadow:0 14px 42px #0009;cursor:pointer;z-index:4}.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,#63dcff,#b482ff)}.window{position:fixed;left:32px;top:14px;width:min(1460px,calc(100vw - 64px));height:min(820px,calc(100vh - 28px));border:1px solid #3a455c;border-radius:22px;background:linear-gradient(180deg,#101622f2,#090d16f2);box-shadow:0 24px 80px #000c;overflow:hidden;display:none;z-index:10}.window.open{display:flex;flex-direction:column}.window.pop{position:fixed;inset:0;left:0;top:0;width:100vw;height:100vh;border-radius:0;border:0;display:flex;flex-direction:column;max-width:none;max-height:none}.window.pop .top{height:64px}.window.pop .chainbar{height:72px}.window.pop .title{font-size:22px}.window.pop .main{grid-template-columns:minmax(620px,1fr) 340px}.top{height:72px;display:flex;align-items:center;gap:18px;padding:0 22px;border-bottom:1px solid #2d374c;background:#111724e8}.title{font-size:26px;font-weight:900;display:flex;align-items:center;gap:14px}.badge{font-size:14px;color:#cbd6eb;border:1px solid #3a4354;border-radius:10px;padding:3px 8px;background:#ffffff13}.spacer{flex:1}.global{display:flex;align-items:center;gap:12px;color:#cbd6eb}.global input{width:112px}.btn,.iconbtn{border:1px solid #3a4459;background:#ffffff11;color:#eaf0ff;cursor:pointer}.btn{padding:10px 14px;border-radius:14px;font-size:16px}.iconbtn{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:20px}.btn:hover,.iconbtn:hover{background:#ffffff20}.chainbar{height:80px;display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid #2d374c;background:#0f1420cc;overflow-x:auto}.chain{min-width:230px;height:54px;display:flex;align-items:center;gap:12px;padding:0 14px;border-radius:17px;border:1px solid #313b4f;background:#ffffff0d;cursor:pointer;color:#dde7f9;font-weight:850;font-size:21px}.chain.active{border-color:#55d6ff;box-shadow:0 0 0 1px #55d6ff66 inset;background:#152437}.folder{width:34px;height:25px;border-radius:6px;background:linear-gradient(180deg,#486ac0,#25365f);position:relative}.folder:before{content:"";position:absolute;left:5px;top:-7px;width:17px;height:10px;border-radius:6px 6px 0 0;background:#5578cf}.chain .miniicons{margin-left:auto;font-size:15px;display:flex;gap:8px}.addchain{min-width:110px;justify-content:center;font-weight:500}.main{flex:1;display:grid;grid-template-columns:minmax(560px,1fr) 380px;min-height:0}.left{display:flex;flex-direction:column;min-width:0}.chainhead{height:66px;display:flex;align-items:center;gap:12px;padding:8px 20px;border-bottom:1px solid #2d374c;background:#111724cc}.chainname{font-size:22px;font-weight:900;min-width:96px;line-height:1.05}.smallfield{display:flex;align-items:center;gap:7px;color:#aebbd1;font-size:16px}.smallfield select,.smallfield input{background:#0d111b;border:1px solid #343e53;border-radius:12px;color:#e7eefc;padding:9px 12px;font-size:16px;min-width:64px}.toolbar{margin-left:auto;display:flex;align-items:center;gap:10px}.zoom{font-size:15px;color:#aebbd1;width:45px;text-align:center}.workspace{position:relative;flex:1;min-height:0;background:#070a11;overflow:hidden;cursor:grab;user-select:none}.workspace.panning{cursor:grabbing}.grid{position:absolute;inset:-200%;background-image:linear-gradient(#25334f55 1px,transparent 1px),linear-gradient(90deg,#25334f55 1px,transparent 1px);background-size:48px 48px;opacity:.55;transform-origin:0 0;pointer-events:none}.world{position:absolute;left:0;top:0;width:2400px;height:1600px;transform-origin:0 0}.edges{position:absolute;left:0;top:0;width:2400px;height:1600px;overflow:visible}.edgeHit{fill:none;stroke:transparent;stroke-width:26;pointer-events:stroke;cursor:pointer}.edgePath{fill:none;stroke:#59d8ff;stroke-width:4;stroke-linecap:round;filter:drop-shadow(0 0 5px #3ccfff99);pointer-events:none}.edgePath.selected{stroke:#fff;stroke-width:5}.previewPath{fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 7;filter:drop-shadow(0 0 5px #fff8);pointer-events:none}.node{position:absolute;width:140px;height:70px;border:2px solid #5b6679;border-radius:12px;background:linear-gradient(180deg,#171d2b,#0f1522);box-shadow:0 10px 24px #0009,0 0 0 1px #000 inset;cursor:move;padding:12px}.node.selected{box-shadow:0 0 0 2px #fff7,0 0 20px #65d9ff88}.node.ks{border-color:var(--pink)}.node.filter{border-color:var(--yellow)}.node.delay{border-color:var(--purple)}.node.gain{border-color:var(--green)}.node.out{border-color:#37cfff}.node.analyzer{border-color:#98a8c6}.node.reverb{border-color:#55c3ff}.node.source{border-color:#ff9f64}.node .nt{font-weight:900;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.node .ports{position:absolute;left:10px;right:10px;bottom:9px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#d2ddf0}.port{width:13px;height:13px;border-radius:50%;background:#70dfff;box-shadow:0 0 10px #6bdfff;display:inline-block;cursor:crosshair}.portLabel{display:flex;gap:6px;align-items:center}.ghost{position:absolute;width:140px;height:70px;border:2px dashed #70dfff;border-radius:12px;background:#70dfff18;pointer-events:none;display:none;z-index:3;align-items:center;padding:12px;font-weight:900;color:#dff8ff}.hint{position:absolute;left:18px;bottom:16px;color:#9ba8bd;background:#09101bcc;border:1px solid #263249;border-radius:999px;padding:8px 13px;font-size:14px;pointer-events:none}.menu{position:fixed;min-width:205px;background:#131927;border:1px solid #3a455c;border-radius:14px;box-shadow:0 18px 50px #000b;display:none;z-index:80;padding:8px}.menu button{display:block;width:100%;text-align:left;background:transparent;border:0;color:#eaf0ff;padding:11px 12px;border-radius:10px;font-size:15px;cursor:pointer}.menu button:hover{background:#ffffff14}.menu .muted{color:#9ba8bd;font-size:13px;padding:8px 12px}.inspector{border-left:1px solid #2d374c;background:#0c111bcc;min-width:0;display:flex;flex-direction:column}.inspTitle{height:66px;border-bottom:1px solid #2d374c;display:flex;align-items:center;padding:0 20px;font-size:22px;font-weight:950}.inspBody{padding:18px;overflow:auto}.sub{color:#8f9bb0;font-size:14px;margin-top:-8px;margin-bottom:22px}.param{margin:15px 0}.param label{display:flex;justify-content:space-between;color:#c8d2e5;margin-bottom:8px}.param input[type=text],.param select{width:100%;background:#1a202d;border:1px solid #394257;border-radius:10px;color:#eaf0ff;padding:11px;font-size:15px}.param input[type=range]{width:100%}.danger{width:100%;margin-top:18px;background:#31151f;border-color:#743140;color:#ffd3d8}.empty{height:100%;display:grid;place-items:center;color:#8f9bb0;font-size:18px;text-align:center}.kbd{font-size:12px;color:#93a0b8;line-height:1.7;margin-top:12px}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#101826;border:1px solid #3b445a;border-radius:999px;padding:10px 16px;color:#dce5f7;display:none;z-index:99;box-shadow:0 10px 30px #0009}
</style>
</head>
<body>
<button id="launcher" class="launcher"><span class="logo"></span>Routing Composer</button>
<div id="app" class="window">
  <div class="top"><div class="title"><span class="logo"></span>Routing Composer <span class="badge">Mini</span></div><div class="spacer"></div><div class="global">A4 <input id="a4" type="range" min="420" max="460" value="440"><span id="a4txt">440Hz</span></div><div class="global">Master <input id="master" type="range" min="0" max="1" step="0.01" value="0.30"><span id="mastertxt">0.30</span></div><button class="btn">Import</button><button class="btn">Export</button><button id="pop" class="iconbtn" title="Pop out">↗</button><button id="close" class="iconbtn">×</button></div>
  <div id="chainbar" class="chainbar"></div>
  <div class="main"><div class="left"><div class="chainhead"><div id="chainName" class="chainname">Main<br>KS</div><button id="muteBtn" class="iconbtn" title="Mute">🔊</button><button id="lockBtn" class="iconbtn" title="Lock">🔓</button><div class="smallfield">ch <select id="chSel"><option>all</option><option>1</option><option>2</option><option>3</option></select></div><div class="smallfield">program <select id="pgSel"><option>all</option><option>0</option><option>1</option><option>2</option></select></div><div class="smallfield">gain <input id="chainGain" value="1.00"></div><div class="toolbar"><button id="addNodeBtn" class="btn">+ Module</button><button id="fit" class="btn">Fit</button><button id="zm" class="iconbtn">−</button><span id="zoomtxt" class="zoom">100%</span><button id="zp" class="iconbtn">+</button></div></div>
    <div id="workspace" class="workspace"><div id="grid" class="grid"></div><div id="world" class="world"><svg id="edges" class="edges"></svg><div id="nodes"></div></div><div id="ghost" class="ghost"></div><div id="hint" class="hint">空白拖曳平移・Ctrl + 滾輪縮放・拖 out 到 in 連線・右鍵空白新增</div></div></div>
    <div class="inspector"><div class="inspTitle">Inspector</div><div id="insp" class="inspBody"></div></div>
  </div>
</div>
<div id="menu" class="menu"></div><div id="toast" class="toast"></div>
<script>
(()=>{
const isPopup=new URLSearchParams(location.search).has('popout');
const CH='routing-composer-popout-prototype-v4'; const bc=('BroadcastChannel' in window)?new BroadcastChannel(CH):null;
const labels={ks:'🎸 KS',source:'◉ Osc',filter:'▾ Filter',delay:'◴ Delay',gain:'◯ Gain',analyzer:'▣ Ana',reverb:'◌ Rev',out:'▶ Out'};
const params={ks:['Noise','Smooth','velScale','KS dur'],source:['Wave','Attack','Release'],filter:['Mode','Frequency','Q'],delay:['Time','Feedback','Mix'],gain:['Gain'],analyzer:['FFT size'],reverb:['Mix','Decay'],out:['Level']};
let uid=50;function nid(t){return t.slice(0,2)+(++uid)}
const initial={global:{a4:440,master:.3},active:0,viewport:{x:130,y:120,z:.9},selectedNode:'f1',selectedEdge:null,chains:[{id:'c1',name:'Main KS',muted:false,locked:false,ch:'all',program:'all',gain:'1.00',nodes:[{id:'ks1',type:'ks',x:120,y:260},{id:'f1',type:'filter',x:330,y:260},{id:'d1',type:'delay',x:560,y:200},{id:'g1',type:'gain',x:560,y:340},{id:'out1',type:'out',x:820,y:270}],edges:[['ks1','f1'],['f1','d1'],['f1','g1'],['d1','out1'],['g1','out1']]},{id:'c2',name:'Nylon Preset',muted:false,locked:true,ch:'all',program:'all',gain:'0.85',nodes:[{id:'ks2',type:'ks',x:160,y:260},{id:'f2',type:'filter',x:380,y:260},{id:'out2',type:'out',x:620,y:260}],edges:[['ks2','f2'],['f2','out2']]},{id:'c3',name:'Delay Texture',muted:true,locked:false,ch:'2',program:'all',gain:'0.70',nodes:[{id:'out3',type:'out',x:520,y:270}],edges:[]}]};
let state=JSON.parse(localStorage.getItem(CH)||'null')||initial;
if(isPopup){ state.viewport={x:180,y:120,z:1}; }
let pan=null,dragNode=null,placing=null,connect=null,lastMouse={x:0,y:0},ignoreClick=false;
const app=document.getElementById('app'),launcher=document.getElementById('launcher'),ws=document.getElementById('workspace'),world=document.getElementById('world'),grid=document.getElementById('grid'),edgesSvg=document.getElementById('edges'),nodesEl=document.getElementById('nodes'),insp=document.getElementById('insp'),menu=document.getElementById('menu'),ghost=document.getElementById('ghost'),toastEl=document.getElementById('toast');
if(isPopup){app.classList.add('pop');launcher.style.display='none';document.getElementById('close').style.display='none';document.getElementById('pop').style.display='none'}else{app.classList.add('open')}
launcher.onclick=()=>app.classList.toggle('open');document.getElementById('close').onclick=()=>app.classList.remove('open');
function clone(o){return JSON.parse(JSON.stringify(o))} function activeChain(){return state.chains[state.active]} function post(){localStorage.setItem(CH,JSON.stringify(state));const outgoing=clone(state);delete outgoing.viewport;bc&&bc.postMessage({state:outgoing})} if(bc)bc.onmessage=e=>{if(e.data?.state){const vp=state.viewport||clone(initial.viewport);state={...state,...e.data.state,viewport:vp};render()}};
function toast(t){toastEl.textContent=t;toastEl.style.display='block';clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.style.display='none',1400)}
function screenToWorld(x,y){const r=ws.getBoundingClientRect();return{x:(x-r.left-state.viewport.x)/state.viewport.z,y:(y-r.top-state.viewport.y)/state.viewport.z}}
function worldToScreen(x,y){const r=ws.getBoundingClientRect();return{x:r.left+state.viewport.x+x*state.viewport.z,y:r.top+state.viewport.y+y*state.viewport.z}}
function applyViewport(){const t=`translate(${state.viewport.x}px,${state.viewport.y}px) scale(${state.viewport.z})`;world.style.transform=t;grid.style.transform=`translate(${state.viewport.x%48}px,${state.viewport.y%48}px) scale(${state.viewport.z})`;document.getElementById('zoomtxt').textContent=Math.round(state.viewport.z*100)+'%'}
function portPos(n,kind){return kind==='out'?{x:n.x+128,y:n.y+56}:{x:n.x+12,y:n.y+56}}
function pathBetween(a,b){const dx=Math.max(90,Math.abs(b.x-a.x)*.45);return`M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`}
function showMenu(x,y,items){menu.innerHTML='';items.forEach(it=>{const b=document.createElement('button');b.textContent=it[0];b.onclick=()=>{hideMenu();it[1]()};menu.appendChild(b)});menu.style.left=x+'px';menu.style.top=y+'px';menu.style.display='block'} function hideMenu(){menu.style.display='none'}
document.addEventListener('pointerdown',e=>{if(!menu.contains(e.target))hideMenu()});
function addAt(type,w){const c=activeChain();const id=nid(type);c.nodes.push({id,type,x:w.x-70,y:w.y-35});state.selectedNode=id;state.selectedEdge=null;render();post()}
function startPlace(type){placing=type;ghost.textContent=labels[type]||type;ghost.style.display='flex';toast('Move mouse on canvas, click to place module')}
function renderChains(){const bar=document.getElementById('chainbar');bar.innerHTML='';state.chains.forEach((c,i)=>{const el=document.createElement('div');el.className='chain '+(i===state.active?'active':'');el.innerHTML=`<span class="folder"></span><span>${c.name}</span><span class="miniicons">${c.muted?'🔇':'🔊'} ${c.locked?'🔒':'🔓'}</span>`;el.onclick=()=>{state.active=i;state.selectedNode=null;state.selectedEdge=null;render();post()};bar.appendChild(el)});const add=document.createElement('div');add.className='chain addchain';add.textContent='+ Chain';add.onclick=()=>{const i=state.chains.length+1;state.chains.push({id:'c'+i,name:'New Chain '+i,muted:false,locked:false,ch:'all',program:'all',gain:'1.00',nodes:[{id:'out'+(++uid),type:'out',x:520,y:270}],edges:[]});state.active=state.chains.length-1;state.viewport={x:220,y:150,z:1};render();post()};bar.appendChild(add)}
function renderHeader(){const c=activeChain();document.getElementById('chainName').innerHTML=c.name.replace(' ','<br>');document.getElementById('muteBtn').textContent=c.muted?'🔇':'🔊';document.getElementById('lockBtn').textContent=c.locked?'🔒':'🔓';document.getElementById('chSel').value=c.ch;document.getElementById('pgSel').value=c.program;document.getElementById('chainGain').value=c.gain;document.getElementById('a4').value=state.global.a4;document.getElementById('a4txt').textContent=state.global.a4+'Hz';document.getElementById('master').value=state.global.master;document.getElementById('mastertxt').textContent=Number(state.global.master).toFixed(2)}
function renderGraph(){const c=activeChain();nodesEl.innerHTML='';edgesSvg.innerHTML='';edgesSvg.setAttribute('viewBox','0 0 2400 1600');c.edges.forEach((e,i)=>{const a=c.nodes.find(n=>n.id===e[0]),b=c.nodes.find(n=>n.id===e[1]);if(!a||!b)return;const d=pathBetween(portPos(a,'out'),portPos(b,'in'));const hit=document.createElementNS('http://www.w3.org/2000/svg','path');hit.setAttribute('d',d);hit.setAttribute('class','edgeHit');hit.dataset.idx=i;hit.addEventListener('pointerdown',ev=>{ev.stopPropagation();state.selectedEdge=i;state.selectedNode=null;render();post()});hit.addEventListener('contextmenu',ev=>{ev.preventDefault();ev.stopPropagation();showMenu(ev.clientX,ev.clientY,[['Delete connection',()=>{c.edges.splice(i,1);state.selectedEdge=null;render();post()}]])});edgesSvg.appendChild(hit);const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class','edgePath'+(state.selectedEdge===i?' selected':''));edgesSvg.appendChild(p)}); if(connect){const d=pathBetween({x:connect.x,y:connect.y},connect.to);const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',d);p.setAttribute('class','previewPath');edgesSvg.appendChild(p)} c.nodes.forEach(n=>{const div=document.createElement('div');div.className=`node ${n.type} ${state.selectedNode===n.id?'selected':''}`;div.style.left=n.x+'px';div.style.top=n.y+'px';div.dataset.id=n.id;const inHtml=(n.type==='ks'||n.type==='source')?'<span></span>':'<span class="portLabel"><span class="port in" data-port="in"></span>in</span>';div.innerHTML=`<div class="nt">${labels[n.type]||n.type}</div><div class="ports">${inHtml}<span class="portLabel">out<span class="port out" data-port="out"></span></span></div>`;div.addEventListener('pointerdown',ev=>{if(ev.target.classList.contains('port'))return;ev.stopPropagation();state.selectedNode=n.id;state.selectedEdge=null;dragNode={id:n.id,ox:ev.clientX,oy:ev.clientY,sx:n.x,sy:n.y};div.setPointerCapture(ev.pointerId);renderInspector();renderGraph();post()});nodesEl.appendChild(div)});applyViewport()}
function edgeInfo(){const c=activeChain(),e=c.edges[state.selectedEdge];if(!e)return null;const a=c.nodes.find(n=>n.id===e[0]),b=c.nodes.find(n=>n.id===e[1]);return{e,a,b}}
function renderInspector(){const c=activeChain();if(state.selectedEdge!=null){const info=edgeInfo();if(info){insp.innerHTML=`<h2>Connection</h2><div class="sub">Audio route</div><div class="param"><label>From<span>${labels[info.a.type]||info.a.type} out</span></label><input type="text" value="${info.a.id}" readonly></div><div class="param"><label>To<span>${labels[info.b.type]||info.b.type} in</span></label><input type="text" value="${info.b.id}" readonly></div><button class="btn danger" id="delConn">Delete connection</button><div class="kbd">Shortcut: Delete / Backspace</div>`;document.getElementById('delConn').onclick=()=>{c.edges.splice(state.selectedEdge,1);state.selectedEdge=null;render();post()};return}}
const n=c.nodes.find(x=>x.id===state.selectedNode);if(!n){insp.innerHTML='<div class="empty">Select a module<br><div class="kbd">Right-click empty space to add modules.<br>Drag out → in to connect.<br>Right-click a line to delete.</div></div>';return}const ps=params[n.type]||[];insp.innerHTML=`<h2>${labels[n.type]||n.type}</h2><div class="sub">${n.type} module</div><div class="param"><label>Name<span>${n.id}</span></label><input type="text" value="${labels[n.type]||n.type}"></div>`+ps.map((p,i)=>`<div class="param"><label>${p}<span>${i===0?'1200.00':'0.70'}</span></label>${p==='Mode'||p==='Wave'||p==='Noise'?'<select><option>lowpass</option><option>highpass</option><option>sawtooth</option><option>pink</option></select>':'<input type="range" min="0" max="1" step="0.01" value="0.55">'}</div>`).join('')+`<button class="btn danger" id="delNode">Delete module</button>`;document.getElementById('delNode').onclick=()=>{if(n.type==='out'){toast('Output module cannot be deleted');return}c.nodes=c.nodes.filter(x=>x.id!==n.id);c.edges=c.edges.filter(e=>e[0]!==n.id&&e[1]!==n.id);state.selectedNode=null;render();post()}}
function render(){renderChains();renderHeader();renderGraph();renderInspector()}
ws.addEventListener('contextmenu',e=>{if(e.target.closest('.node'))return;e.preventDefault();const w=screenToWorld(e.clientX,e.clientY);showMenu(e.clientX,e.clientY,[['Add KS Source',()=>addAt('ks',w)],['Add Oscillator',()=>addAt('source',w)],['Add Filter',()=>addAt('filter',w)],['Add Delay',()=>addAt('delay',w)],['Add Gain',()=>addAt('gain',w)],['Add Analyzer',()=>addAt('analyzer',w)],['Add Reverb',()=>addAt('reverb',w)]])});
document.getElementById('addNodeBtn').onclick=e=>{showMenu(e.clientX,e.clientY,['ks','source','filter','delay','gain','analyzer','reverb'].map(t=>['Place '+(labels[t]||t),()=>startPlace(t)]))};
ws.addEventListener('pointerdown',e=>{if(e.button!==0&&e.button!==1)return;if(placing)return; if(e.target.closest('.node'))return; if(e.target.classList.contains('edgeHit'))return; e.preventDefault();pan={x:e.clientX,y:e.clientY,vx:state.viewport.x,vy:state.viewport.y};ws.classList.add('panning');try{ws.setPointerCapture(e.pointerId)}catch{};state.selectedNode=null;state.selectedEdge=null;render();});
ws.addEventListener('pointermove',e=>{lastMouse={x:e.clientX,y:e.clientY};if(placing){const r=ws.getBoundingClientRect();ghost.style.left=(e.clientX-r.left-70)+'px';ghost.style.top=(e.clientY-r.top-35)+'px'} if(pan){state.viewport.x=pan.vx+(e.clientX-pan.x);state.viewport.y=pan.vy+(e.clientY-pan.y);applyViewport();ignoreClick=true} if(dragNode){const c=activeChain(),n=c.nodes.find(x=>x.id===dragNode.id);if(n){n.x=dragNode.sx+(e.clientX-dragNode.ox)/state.viewport.z;n.y=dragNode.sy+(e.clientY-dragNode.oy)/state.viewport.z;renderGraph();renderInspector();ignoreClick=true}} if(connect){connect.to=screenToWorld(e.clientX,e.clientY);renderGraph()}});
ws.addEventListener('click',e=>{if(placing){const w=screenToWorld(e.clientX,e.clientY);addAt(placing,w);placing=null;ghost.style.display='none';e.preventDefault();e.stopPropagation();return} if(ignoreClick){ignoreClick=false;return}});
window.addEventListener('pointerup',e=>{if(pan){pan=null;ws.classList.remove('panning');post()} if(dragNode){dragNode=null;post()} if(connect){const el=document.elementFromPoint(e.clientX,e.clientY);const nodeEl=el?.closest?.('.node');let added=false;if(nodeEl&&el.classList.contains('in')&&nodeEl.dataset.id!==connect.from){const c=activeChain();const edge=[connect.from,nodeEl.dataset.id];if(!c.edges.some(x=>x[0]===edge[0]&&x[1]===edge[1])){c.edges.push(edge);added=true}state.selectedEdge=null;state.selectedNode=null;if(added)toast('Connection added')}connect=null;state.selectedEdge=null;render();post()}});
nodesEl.addEventListener('pointerdown',e=>{if(!e.target.classList.contains('out'))return;const node=e.target.closest('.node');const n=activeChain().nodes.find(x=>x.id===node.dataset.id);const p=portPos(n,'out');connect={from:n.id,x:p.x,y:p.y,to:p};state.selectedNode=null;state.selectedEdge=null;e.preventDefault();e.stopPropagation();renderGraph()});
ws.addEventListener('wheel',e=>{if(!e.ctrlKey)return;e.preventDefault();const old=state.viewport.z;const next=Math.max(.25,Math.min(2.2,old*(e.deltaY<0?1.1:.9)));const r=ws.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;const wx=(mx-state.viewport.x)/old,wy=(my-state.viewport.y)/old;state.viewport.z=next;state.viewport.x=mx-wx*next;state.viewport.y=my-wy*next;applyViewport();post()},{passive:false});
document.getElementById('zp').onclick=()=>{state.viewport.z=Math.min(2.2,state.viewport.z*1.15);applyViewport();post()};document.getElementById('zm').onclick=()=>{state.viewport.z=Math.max(.25,state.viewport.z/1.15);applyViewport();post()};
document.getElementById('fit').onclick=()=>{const c=activeChain();if(!c.nodes.length)return;const minX=Math.min(...c.nodes.map(n=>n.x)),maxX=Math.max(...c.nodes.map(n=>n.x+140)),minY=Math.min(...c.nodes.map(n=>n.y)),maxY=Math.max(...c.nodes.map(n=>n.y+70));const r=ws.getBoundingClientRect();const z=Math.min(1.2,Math.max(.35,Math.min((r.width-120)/(maxX-minX||1),(r.height-120)/(maxY-minY||1))));state.viewport.z=z;state.viewport.x=(r.width-(minX+maxX)*z)/2;state.viewport.y=(r.height-(minY+maxY)*z)/2;applyViewport();post()};
window.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&state.selectedEdge!=null){const c=activeChain();c.edges.splice(state.selectedEdge,1);state.selectedEdge=null;render();post()}});
['a4','master'].forEach(id=>document.getElementById(id).oninput=e=>{state.global[id==='a4'?'a4':'master']=Number(e.target.value);renderHeader();post()});document.getElementById('muteBtn').onclick=()=>{activeChain().muted=!activeChain().muted;render();post()};document.getElementById('lockBtn').onclick=()=>{activeChain().locked=!activeChain().locked;render();post()};['chSel','pgSel','chainGain'].forEach(id=>document.getElementById(id).onchange=e=>{const c=activeChain();if(id==='chSel')c.ch=e.target.value;if(id==='pgSel')c.program=e.target.value;if(id==='chainGain')c.gain=e.target.value;render();post()});
document.getElementById('pop').onclick=()=>{window.open(location.pathname+'?popout=1','routingComposerPopV4','width=1280,height=820');setTimeout(()=>post(),300)};
render();setTimeout(()=>document.getElementById('fit').click(), isPopup?180:80);
})();
</script>
</body>
